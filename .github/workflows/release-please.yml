name: Release Please

# 注意: このワークフローを動かすには、リポジトリ設定で
#   Settings → Actions → General → Workflow permissions
#   → "Allow GitHub Actions to create and approve pull requests" を ON
# にする必要があります。

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          # CHANGELOG.md と version bump を自動化
          # Conventional Commits に従ったコミットが必要
