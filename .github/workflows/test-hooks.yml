name: Hook Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '.claude/hooks/**'
      - 'tests/hooks/**'
      - 'tests/conventions/**'
      - '.claude/settings.json'
      - 'docs/decisions/**'
      - 'docs/specs/**'

permissions:
  contents: read

jobs:
  bats-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup bats-core
        uses: bats-core/bats-action@3.0.1

      - name: Install jq + python3
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: Make hooks executable
        run: chmod +x .claude/hooks/*.sh .claude/hooks/*.py

      - name: Run bats tests (hooks)
        run: bats --tap tests/hooks/

      - name: Run bats tests (conventions)
        run: bats --tap tests/conventions/

      - name: Run settings validator
        run: bash scripts/validate-settings.sh

      - name: Run audit script
        run: bash scripts/audit.sh
