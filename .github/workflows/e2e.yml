name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # e2e-snapshots branch への push に必要
  pull-requests: write  # PR コメント投稿
  actions: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test --config tests/e2e/playwright.config.ts
        env:
          CI: true
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
            tests/e2e/test-results.json
          retention-days: 14

      - name: Upload videos and screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-videos-${{ github.run_id }}
          path: tests/e2e/test-results/**/*.{webm,png,zip}
          retention-days: 14
          if-no-files-found: ignore

      - name: Parse test results
        if: always()
        id: parse
        run: |
          if [ -f tests/e2e/test-results.json ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' tests/e2e/test-results.json 2>/dev/null || echo "0")
            PASSED=$(jq '.stats.expected' tests/e2e/test-results.json 2>/dev/null || echo "0")
            FAILED=$(jq '.stats.unexpected' tests/e2e/test-results.json 2>/dev/null || echo "0")
            SKIPPED=$(jq '.stats.skipped' tests/e2e/test-results.json 2>/dev/null || echo "0")
            FLAKY=$(jq '.stats.flaky' tests/e2e/test-results.json 2>/dev/null || echo "0")
            DURATION=$(jq '.stats.duration / 1000' tests/e2e/test-results.json 2>/dev/null || echo "0")
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
            echo "flaky=$FLAKY" >> $GITHUB_OUTPUT
            echo "duration=$DURATION" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "duration=0" >> $GITHUB_OUTPUT
          fi

      - name: Convert webm to gif and collect screenshots
        if: github.event_name == 'pull_request' && always()
        id: convert
        run: |
          set -euo pipefail
          mkdir -p pr-snapshots

          # webm → gif 変換（fps=10, 横幅 800px、品質と容量のバランス）
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            test_dir=$(basename "$(dirname "$f")")
            out="pr-snapshots/${test_dir}.gif"
            ffmpeg -y -i "$f" -vf "fps=10,scale=800:-1:flags=lanczos" -loop 0 "$out" </dev/null 2>/dev/null || true
          done < <(find tests/e2e/test-results -name "*.webm" -type f 2>/dev/null)

          # 明示スクショ + 失敗時スクショをコピー（テスト名プレフィクス付き）
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            test_dir=$(basename "$(dirname "$f")")
            fname=$(basename "$f")
            cp "$f" "pr-snapshots/${test_dir}__${fname}" 2>/dev/null || true
          done < <(find tests/e2e/test-results -name "*.png" -type f 2>/dev/null)

          # outputs（JS から参照）
          gifs=$(ls pr-snapshots/*.gif 2>/dev/null | xargs -n1 basename | tr '\n' ',' | sed 's/,$//')
          pngs=$(ls pr-snapshots/*.png 2>/dev/null | xargs -n1 basename | tr '\n' ',' | sed 's/,$//')
          count=$(ls pr-snapshots/ 2>/dev/null | wc -l | tr -d ' ')

          echo "gifs=$gifs" >> $GITHUB_OUTPUT
          echo "pngs=$pngs" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Deploy snapshots to e2e-snapshots branch
        if: github.event_name == 'pull_request' && steps.convert.outputs.count != '0' && steps.convert.outputs.count != ''
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: e2e-snapshots
          folder: pr-snapshots
          target-folder: snapshots/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}
          clean: false
          single-commit: false
          commit-message: "snapshot(e2e): PR #${{ github.event.pull_request.number }} run ${{ github.run_id }}"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const stats = {
              total: '${{ steps.parse.outputs.total }}',
              passed: '${{ steps.parse.outputs.passed }}',
              failed: '${{ steps.parse.outputs.failed }}',
              skipped: '${{ steps.parse.outputs.skipped }}',
              flaky: '${{ steps.parse.outputs.flaky }}',
              duration: '${{ steps.parse.outputs.duration }}',
            };
            const status = Number(stats.failed) > 0
              ? '❌ Failed'
              : (Number(stats.flaky) > 0 ? '⚠️ Flaky' : '✅ Passed');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // インライン用 raw URL
            const baseUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/e2e-snapshots/snapshots/pr-${context.issue.number}/${context.runId}`;
            const gifs = '${{ steps.convert.outputs.gifs }}'.split(',').filter(Boolean);
            const pngs = '${{ steps.convert.outputs.pngs }}'.split(',').filter(Boolean);

            const renderItem = (name) => `<details><summary>${name}</summary>\n\n![${name}](${baseUrl}/${encodeURIComponent(name)})\n\n</details>`;

            const mediaSection = [];
            if (gifs.length > 0) {
              mediaSection.push('', '### 🎬 操作録画 (GIF)', '', ...gifs.map(renderItem));
            }
            if (pngs.length > 0) {
              mediaSection.push('', '### 📸 スクリーンショット', '', ...pngs.map(renderItem));
            }
            if (mediaSection.length === 0) {
              mediaSection.push('', '_（録画 / スクショなし）_');
            }

            const body = [
              `## 🎭 E2E Test Results`,
              ``,
              `**Status**: ${status}`,
              ``,
              `| Metric | Count |`,
              `|--------|-------|`,
              `| ✅ Passed | ${stats.passed} |`,
              `| ❌ Failed | ${stats.failed} |`,
              `| ⏭ Skipped | ${stats.skipped} |`,
              `| ⚠️ Flaky | ${stats.flaky} |`,
              `| ⏱ Duration | ${stats.duration}s |`,
              ...mediaSection,
              ``,
              `### 📦 Artifacts (原本: webm / HTML report)`,
              ``,
              `- 🎬 [動画 .webm & スクショ .png](${runUrl}#artifacts) — \`playwright-videos-${context.runId}\``,
              `- 📊 [HTML Report](${runUrl}#artifacts) — \`playwright-report-${context.runId}\``,
              ``,
              `### 💡 ローカル再現`,
              ``,
              `\`\`\`bash`,
              `npm ci`,
              `npx playwright install --with-deps chromium`,
              `npx playwright test --config tests/e2e/playwright.config.ts`,
              `npx playwright show-report tests/e2e/playwright-report`,
              `\`\`\``,
              ``,
              `---`,
              `<sub>🤖 [.github/workflows/e2e.yml](.github/workflows/e2e.yml) が自動投稿。GIF / PNG は \`e2e-snapshots\` branch から配信。</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🎭 E2E Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if E2E failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
