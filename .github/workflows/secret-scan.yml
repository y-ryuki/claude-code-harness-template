name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 0:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # gitleaks-action は org plan の license が必要なので、CLI を直接使う
      - name: Install gitleaks
        run: |
          GL_VERSION="8.21.4"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks-bin
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks-bin gitleaks
          sudo install /tmp/gitleaks-bin/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full history)
        if: github.event_name == 'schedule' || github.event_name == 'push'
        run: gitleaks detect --config .gitleaks.toml --redact --verbose

      - name: Run gitleaks (PR diff only)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
