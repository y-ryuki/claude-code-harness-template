name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-settings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate .claude/settings.json
        run: |
          jq empty .claude/settings.json
          echo "✅ settings.json is valid JSON"

      - name: Validate hook scripts have shebang
        run: |
          set -e
          for f in .claude/hooks/*.sh; do
            head -1 "$f" | grep -qE '^#!.*bash' || (echo "❌ $f missing shebang" && exit 1)
          done
          for f in .claude/hooks/*.py; do
            head -1 "$f" | grep -qE '^#!.*python' || (echo "❌ $f missing shebang" && exit 1)
          done
          echo "✅ All hook scripts have proper shebangs"

      - name: Shellcheck hooks
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.claude/hooks'
          additional_files: 'scripts/*.sh .devcontainer/*.sh'

  audit-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run audit script
        run: |
          chmod +x scripts/audit.sh
          ./scripts/audit.sh
